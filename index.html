<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Undertale Engine - Final Working Version</title>
<style>
    body {
        background: black;
        margin: 0;
        overflow: hidden;
        font-family: "Courier New", monospace;
        color: white;
    }
    #game {
        display: block;
        margin: 0 auto;
        background: black;
        border: 2px solid white;
    }
    #ui {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 20px;
        width: 800px;
        text-align: center;
    }
    .btn-row {
        margin-top: 10px;
    }
    button {
        background: black;
        color: white;
        border: 2px solid white;
        padding: 4px 10px;
        margin: 4px;
        font-family: "Courier New", monospace;
        cursor: pointer;
    }
</style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="ui">
    <div id="status">HP: <span id="hp">20</span> / 20</div>
    <div id="text">Press START to begin.</div>

    <div class="btn-row">
        <button id="start">START</button>
        <button id="restart">RESTART</button>
    </div>

    <div class="btn-row">
        <button id="fight">FIGHT</button>
        <button id="act">ACT</button>
        <button id="item">ITEM</button>
        <button id="mercy">MERCY</button>
    </div>
</div>

<script>
// =========================
// CANVAS
// =========================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

// =========================
// UI
// =========================
const hpSpan = document.getElementById("hp");
const textBox = document.getElementById("text");

const btnStart = document.getElementById("start");
const btnRestart = document.getElementById("restart");
const btnFight = document.getElementById("fight");
const btnAct = document.getElementById("act");
const btnItem = document.getElementById("item");
const btnMercy = document.getElementById("mercy");

// =========================
// GAME STATE
// =========================
let battleStarted = false;
let playerHP = 20;

let keys = {};

const box = { x: 200, y: 220, w: 400, h: 240 };

const soul = {
    x: 400,
    y: 360,
    speed: 5
};

const boss = {
    hp: 300,
    maxHP: 300,
    x: 400,
    y: 140,
    dir: 1
};

let attackTimer = 0;
let attackActive = false;
let currentAttack = null;

let bullets = [];
let bones = [];

// =========================
// TEXT
// =========================
function setText(t) {
    textBox.textContent = t;
}

// =========================
// RESET GAME
// =========================
function resetGame() {
    playerHP = 20;
    hpSpan.textContent = playerHP;

    soul.x = 400;
    soul.y = 360;

    boss.hp = boss.maxHP;

    bullets = [];
    bones = [];

    attackActive = false;
    currentAttack = null;
    battleStarted = false;

    setText("Press START to begin.");
}

// =========================
// START BATTLE
// =========================
btnStart.onclick = () => {
    if (battleStarted) return;
    battleStarted = true;
    setText("The battle begins!");
    startAttack();
};

btnRestart.onclick = () => resetGame();

// =========================
// PLAYER BUTTONS
// =========================
btnFight.onclick = () => {
    if (!battleStarted || attackActive) return;
    boss.hp -= 25;
    if (boss.hp <= 0) {
        boss.hp = 0;
        setText("You defeated the boss!");
        return;
    }
    setText("You attack!");
    startAttack();
};

btnAct.onclick = () => {
    if (!battleStarted || attackActive) return;
    setText("You tell a joke. The boss ignores you.");
    startAttack();
};

btnItem.onclick = () => {
    if (!battleStarted || attackActive) return;
    if (playerHP < 20) {
        playerHP += 8;
        if (playerHP > 20) playerHP = 20;
        hpSpan.textContent = playerHP;
        setText("You ate a snack.");
    } else {
        setText("You're already full.");
    }
    startAttack();
};

btnMercy.onclick = () => {
    if (!battleStarted || attackActive) return;
    if (boss.hp <= 40) {
        setText("You spared the boss.");
        attackActive = false;
    } else {
        setText("The boss refuses.");
        startAttack();
    }
};

// =========================
// ATTACK SYSTEM
// =========================
// ⭐ NO BONE WALL
const attackList = ["rain", "wave"];

function startAttack() {
    attackActive = true;
    attackTimer = 0;
    bullets = [];
    bones = [];

    currentAttack = attackList[Math.floor(Math.random() * attackList.length)];

    if (currentAttack === "rain") setupRain();
    if (currentAttack === "wave") setupWave();

    setText("Attack: " + currentAttack);
}

function endAttack() {
    attackActive = false;
    currentAttack = null;
    bullets = [];
    bones = [];
    setText("Your turn.");
}

// =========================
// BULLET RAIN
// =========================
function setupRain() {
    for (let i = 0; i < 20; i++) {
        bullets.push({
            x: box.x + Math.random() * box.w,
            y: box.y - Math.random() * 300,
            size: 20
        });
    }
}

function updateRain() {
    bullets.forEach(b => {
        b.y += 4;
        if (b.y > box.y + box.h + 40) {
            b.y = box.y - 200;
            b.x = box.x + Math.random() * box.w;
        }
        checkHit(b.x, b.y, b.size, b.size);
    });
}

function drawRain() {
    ctx.fillStyle = "white";
    bullets.forEach(b => ctx.fillRect(b.x, b.y, b.size, b.size));
}

// =========================
// BONE WAVE
// =========================
function setupWave() {
    for (let i = 0; i < 6; i++) {
        bones.push({
            x: box.x - 200 - i * 120,
            y: box.y + 40 + i * 20,
            w: 40,
            h: 160
        });
    }
}

function updateWave() {
    bones.forEach(b => {
        b.x += 4;
        if (b.x > box.x + box.w + 200) b.x = box.x - 200;
        checkHit(b.x, b.y, b.w, b.h);
    });
}

function drawWave() {
    ctx.fillStyle = "white";
    bones.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
}

// =========================
// HIT DETECTION
// =========================
function checkHit(x, y, w, h) {
    if (soul.x > x && soul.x < x + w && soul.y > y && soul.y < y + h) {
        takeDamage(1);
    }
}

function takeDamage(n) {
    playerHP -= n;
    if (playerHP < 0) playerHP = 0;
    hpSpan.textContent = playerHP;
    if (playerHP <= 0) {
        setText("You died.");
        attackActive = false;
    }
}

// =========================
// SOUL MOVEMENT
// =========================
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

function updateSoul() {
    if (!attackActive) return;

    if (keys["ArrowLeft"]) soul.x -= soul.speed;
    if (keys["ArrowRight"]) soul.x += soul.speed;
    if (keys["ArrowUp"]) soul.y -= soul.speed;
    if (keys["ArrowDown"]) soul.y += soul.speed;

    soul.x = Math.max(box.x + 10, Math.min(soul.x, box.x + box.w - 10));
    soul.y = Math.max(box.y + 10, Math.min(soul.y, box.y + box.h - 10));
}

// =========================
// DRAW SOUL
// =========================
function drawSoul() {
    const px = Math.round(soul.x);
    const py = Math.round(soul.y);
    const s = 3;

    ctx.fillStyle = "red";

    ctx.fillRect(px - 3*s, py - 2*s, 2*s, 2*s);
    ctx.fillRect(px + s, py - 2*s, 2*s, 2*s);

    ctx.fillRect(px - 4*s, py - s, 4*s, 2*s);
    ctx.fillRect(px, py - s, 4*s, 2*s);

    ctx.fillRect(px - 4*s, py + s, 8*s, 2*s);

    ctx.fillRect(px - 3*s, py + 3*s, 6*s, 2*s);

    ctx.fillRect(px - 2*s, py + 5*s, 4*s, 2*s);
}

// =========================
// DRAW BOSS + HP BAR
// =========================
function drawBoss() {
    // Move boss
    boss.x += boss.dir * 2;
    if (boss.x < 160 || boss.x > canvas.width - 160) boss.dir *= -1;

    // Boss name
    ctx.fillStyle = "white";
    ctx.font = "26px Courier New";
    ctx.textAlign = "center";
    ctx.fillText("VOIDLING", boss.x, boss.y - 40);

    // Boss sprite
    ctx.fillStyle = "white";
    ctx.fillRect(boss.x - 32, boss.y - 32, 64, 64);

    // Eyes
    ctx.fillStyle = "black";
    ctx.fillRect(boss.x - 18, boss.y - 18, 12, 12);
    ctx.fillRect(boss.x + 6, boss.y - 18, 12, 12);

    // Mouth
    ctx.fillRect(boss.x - 12, boss.y + 6, 24, 10);

    // HP BAR (Guaranteed visible)
    const barX = 100;
    const barY = 80;
    const barW = 600;
    const barH = 20;

    const hpPercent = boss.hp / boss.maxHP;
    const hpWidth = barW * hpPercent;

    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;
    ctx.strokeRect(barX, barY, barW, barH);

    ctx.fillStyle = "yellow";
    ctx.fillRect(barX, barY, hpWidth, barH);

    ctx.fillStyle = "white";
    ctx.font = "20px Courier New";
    ctx.fillText(`HP: ${boss.hp} / ${boss.maxHP}`, barX + barW / 2, barY - 10);
}

// =========================
// DRAW BOX
// =========================
function drawBox() {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.strokeRect(box.x, box.y, box.w, box.h);
}

// =========================
// GAME LOOP
// =========================
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBoss();
    drawBox();
    drawSoul();

    if (attackActive) {
        attackTimer++;

        if (currentAttack === "rain") {
            updateRain();
            drawRain();
        }
        if (currentAttack === "wave") {
            updateWave();
            drawWave();
        }

        if (attackTimer > 240) endAttack();
    }

    updateSoul();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
