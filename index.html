<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Undertale Battle Engine (800x600)</title>
<style>
    body {
        background: black;
        color: white;
        font-family: "Courier New", monospace;
        margin: 0;
        overflow: hidden;
    }
    #game {
        display: block;
        margin: 0 auto;
        background: black;
        border: 2px solid white;
    }
    #ui {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 40px;
        width: 800px;
        text-align: center;
        color: white;
    }
    .buttons {
        display: flex;
        justify-content: space-around;
        margin-top: 10px;
    }
    button {
        background: black;
        color: white;
        border: 2px solid white;
        padding: 4px 10px;
        cursor: pointer;
        font-family: "Courier New", monospace;
    }
    button:focus {
        outline: none;
    }
</style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="ui">
    <div id="status">HP: <span id="hp">20</span> / 20</div>
    <div id="text"></div>
    <div class="buttons">
        <button id="fight">FIGHT</button>
        <button id="act">ACT</button>
        <button id="item">ITEM</button>
        <button id="mercy">MERCY</button>
    </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const hpSpan = document.getElementById("hp");
const textBox = document.getElementById("text");

const btnFight = document.getElementById("fight");
const btnAct = document.getElementById("act");
const btnItem = document.getElementById("item");
const btnMercy = document.getElementById("mercy");

let soulMode = "red";

const soulColors = {
    red: "#ff0000",
    blue: "#0000ff",
    green: "#00ff00",
    yellow: "#ffff00",
    purple: "#800080",
    cyan: "#00ffff",
    orange: "#ff8000",
    white: "#ffffff"
};

const soul = {
    x: canvas.width / 2,
    y: canvas.height / 2 + 60,
    size: 12,
    speed: 5,
    vy: 0
};

const boss = {
    name: "VOIDLING",
    hp: 120,
    maxHP: 120,
    x: canvas.width / 2,
    y: 140,
    dir: 1
};

const box = {
    x: 200,
    y: 220,
    w: 400,
    h: 240
};

const bullets = [];
let keys = {};
let playerHP = 20;
let inAttackPhase = false;
let attackTimer = 0;
let attackDuration = 260;

function setText(msg) {
    textBox.textContent = msg;
}

function resetBullets() {
    bullets.length = 0;
    for (let i = 0; i < 22; i++) {
        bullets.push({
            x: box.x + Math.random() * box.w,
            y: box.y - 20,
            r: 7,
            type: Math.random() < 0.33 ? "white" : (Math.random() < 0.5 ? "blue" : "orange")
        });
    }
}

function startEnemyAttack() {
    inAttackPhase = true;
    attackTimer = 0;
    resetBullets();
    setText(boss.name + " attacks!");
}

function endEnemyAttack() {
    inAttackPhase = false;
    setText("What will you do?");
}

function drawBox() {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.strokeRect(box.x, box.y, box.w, box.h);
}

function drawSoul() {
    ctx.fillStyle = soulColors[soulMode];
    ctx.beginPath();
    ctx.moveTo(soul.x, soul.y);
    ctx.arc(soul.x - 5, soul.y - 5, soul.size / 2, 0, Math.PI * 2);
    ctx.arc(soul.x + 5, soul.y - 5, soul.size / 2, 0, Math.PI * 2);
    ctx.lineTo(soul.x, soul.y + soul.size);
    ctx.closePath();
    ctx.fill();
}

function drawBoss() {
    boss.x += boss.dir * 2;
    if (boss.x < 160 || boss.x > canvas.width - 160) {
        boss.dir *= -1;
    }

    ctx.fillStyle = "white";
    ctx.font = "26px Courier New";
    ctx.textAlign = "center";
    ctx.fillText(boss.name, boss.x, boss.y - 32);

    ctx.beginPath();
    ctx.arc(boss.x, boss.y, 32, 0, Math.PI * 2);
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.stroke();
}

function drawBossHP() {
    const barX = 80;
    const barY = 50;
    const barW = canvas.width - 160;
    const barH = 18;

    const hpPercent = boss.hp / boss.maxHP;
    const hpWidth = barW * hpPercent;

    ctx.strokeStyle = "white";
    ctx.strokeRect(barX, barY, barW, barH);

    ctx.fillStyle = "yellow";
    ctx.fillRect(barX, barY, hpWidth, barH);

    ctx.fillStyle = "white";
    ctx.font = "18px Courier New";
    ctx.textAlign = "center";
    ctx.fillText(`HP: ${boss.hp}/${boss.maxHP}`, barX + barW / 2, barY - 8);
}

function drawBullets() {
    bullets.forEach(b => {
        ctx.fillStyle = b.type === "blue" ? "#0000ff" :
                        b.type === "orange" ? "#ff8000" : "white";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
    });
}

function updateSoul() {
    if (!inAttackPhase) return;

    if (soulMode === "blue") {
        soul.vy += 0.3;
        soul.y += soul.vy;
        if (keys["ArrowUp"]) soul.vy = -6;
    } else {
        if (keys["ArrowLeft"]) soul.x -= soul.speed;
        if (keys["ArrowRight"]) soul.x += soul.speed;
        if (keys["ArrowUp"]) soul.y -= soul.speed;
        if (keys["ArrowDown"]) soul.y += soul.speed;
    }

    soul.x = Math.max(box.x + soul.size, Math.min(soul.x, box.x + box.w - soul.size));
    soul.y = Math.max(box.y + soul.size, Math.min(soul.y, box.y + box.h - soul.size));
}

function updateBullets() {
    if (!inAttackPhase) return;

    bullets.forEach(b => {
        b.y += 3.5;
        if (b.y > box.y + box.h + 30) {
            b.y = box.y - 30;
            b.x = box.x + Math.random() * box.w;
        }

        const dx = b.x - soul.x;
        const dy = b.y - soul.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < b.r + soul.size / 2) {
            const moving = keys["ArrowUp"] || keys["ArrowDown"] || keys["ArrowLeft"] || keys["ArrowRight"];
            if (b.type === "blue" && !moving) {
                takeDamage(1);
            } else if (b.type === "orange" && moving) {
                takeDamage(1);
            } else if (b.type === "white") {
                takeDamage(1);
            }
        }
    });
}

function takeDamage(amount) {
    playerHP -= amount;
    if (playerHP < 0) playerHP = 0;
    hpSpan.textContent = playerHP;
    if (playerHP <= 0) {
        setText("You died.");
        inAttackPhase = false;
    }
}

function enemyTakeDamage(amount) {
    boss.hp -= amount;
    if (boss.hp < 0) boss.hp = 0;

    if (boss.hp <= 0) {
        setText("You defeated " + boss.name + "!");
        inAttackPhase = false;
    } else {
        startEnemyAttack();
    }
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBoss();
    drawBossHP();
    drawBox();
    drawSoul();
    drawBullets();

    updateSoul();
    updateBullets();

    if (inAttackPhase) {
        attackTimer++;
        if (attackTimer > attackDuration) {
            endEnemyAttack();
        }
    }

    requestAnimationFrame(gameLoop);
}

window.addEventListener("keydown", e => {
    keys[e.key] = true;

    if (e.key === "1") soulMode = "red";
    if (e.key === "2") soulMode = "blue";
    if (e.key === "3") soulMode = "green";
    if (e.key === "4") soulMode = "yellow";
    if (e.key === "5") soulMode = "purple";
    if (e.key === "6") soulMode = "cyan";
    if (e.key === "7") soulMode = "orange";
    if (e.key === "8") soulMode = "white";
});

window.addEventListener("keyup", e => {
    keys[e.key] = false;
});

btnFight.onclick = () => {
    if (inAttackPhase || playerHP <= 0 || boss.hp <= 0) return;
    setText("You attack!");
    enemyTakeDamage(12);
};

btnAct.onclick = () => {
    if (inAttackPhase || playerHP <= 0 || boss.hp <= 0) return;
    setText("You taunt " + boss.name + ". It grins.");
    startEnemyAttack();
};

btnItem.onclick = () => {
    if (inAttackPhase || playerHP <= 0 || boss.hp <= 0) return;
    if (playerHP >= 20) {
        setText("You don't need healing.");
        return;
    }
    setText("You ate a pie. HP restored.");
    playerHP = Math.min(20, playerHP + 10);
    hpSpan.textContent = playerHP;
    startEnemyAttack();
};

btnMercy.onclick = () => {
    if (inAttackPhase || playerHP <= 0 || boss.hp <= 0) return;
    if (boss.hp <= 20) {
        setText("You spared " + boss.name + ".");
        inAttackPhase = false;
    } else {
        setText(boss.name + " refuses.");
        startEnemyAttack();
    }
};

setText(boss.name + " emerges from the darkness.");
gameLoop();
</script>

</body>
</html>
