<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const hpSpan = document.getElementById("hp");
  const textBox = document.getElementById("text");

  const btnFight = document.getElementById("fight");
  const btnAct = document.getElementById("act");
  const btnItem = document.getElementById("item");
  const btnMercy = document.getElementById("mercy");

  // Player soul
  const soul = {
    x: 200,
    y: 200,
    size: 8,
    speed: 3
  };

  // Boss object
  const boss = {
    name: "VOIDLING",
    hp: 60,
    maxHP: 60,
    x: 200,
    y: 60
  };

  // Bullets
  const bullets = [];
  const bulletSpeed = 2;

  // Battle box
  const box = {
    x: 80,
    y: 80,
    w: 240,
    h: 140
  };

  let keys = {};
  let playerHP = 20;
  let inAttackPhase = false;
  let attackTimer = 0;
  let attackDuration = 200;

  function setText(msg) {
    textBox.textContent = msg;
  }

  function resetBullets() {
    bullets.length = 0;
    for (let i = 0; i < 12; i++) {
      bullets.push({
        x: box.x + Math.random() * box.w,
        y: box.y - 10,
        r: 4
      });
    }
  }

  function startEnemyAttack() {
    inAttackPhase = true;
    attackTimer = 0;
    resetBullets();
    setText(boss.name + " attacks!");
  }

  function endEnemyAttack() {
    inAttackPhase = false;
    setText("What will you do?");
  }

  function drawBox() {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.strokeRect(box.x, box.y, box.w, box.h);
  }

  function drawSoul() {
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.moveTo(soul.x, soul.y);
    ctx.arc(soul.x - 3, soul.y - 3, soul.size / 2, 0, Math.PI * 2);
    ctx.arc(soul.x + 3, soul.y - 3, soul.size / 2, 0, Math.PI * 2);
    ctx.lineTo(soul.x, soul.y + soul.size);
    ctx.closePath();
    ctx.fill();
  }

  function drawBoss() {
    ctx.fillStyle = "white";
    ctx.font = "20px Courier New";
    ctx.textAlign = "center";
    ctx.fillText(boss.name, boss.x, boss.y - 20);

    // Simple boss sprite (circle)
    ctx.beginPath();
    ctx.arc(boss.x, boss.y, 20, 0, Math.PI * 2);
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  function drawBossHP() {
    const barX = 50;
    const barY = 20;
    const barW = 300;
    const barH = 12;

    const hpPercent = boss.hp / boss.maxHP;
    const hpWidth = barW * hpPercent;

    ctx.strokeStyle = "white";
    ctx.strokeRect(barX, barY, barW, barH);

    ctx.fillStyle = "yellow";
    ctx.fillRect(barX, barY, hpWidth, barH);

    ctx.fillStyle = "white";
    ctx.font = "14px Courier New";
    ctx.fillText(`HP: ${boss.hp}/${boss.maxHP}`, barX + barW / 2, barY - 5);
  }

  function drawBullets() {
    ctx.fillStyle = "white";
    bullets.forEach(b => {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function updateSoul() {
    if (!inAttackPhase) return;

    if (keys["ArrowLeft"]) soul.x -= soul.speed;
    if (keys["ArrowRight"]) soul.x += soul.speed;
    if (keys["ArrowUp"]) soul.y -= soul.speed;
    if (keys["ArrowDown"]) soul.y += soul.speed;

    // Clamp to box
    soul.x = Math.max(box.x + soul.size, Math.min(soul.x, box.x + box.w - soul.size));
    soul.y = Math.max(box.y + soul.size, Math.min(soul.y, box.y + box.h - soul.size));
  }

  function updateBullets() {
    if (!inAttackPhase) return;

    bullets.forEach(b => {
      b.y += bulletSpeed;
      if (b.y > box.y + box.h + 10) {
        b.y = box.y - 10;
        b.x = box.x + Math.random() * box.w;
      }

      const dx = b.x - soul.x;
      const dy = b.y - soul.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < b.r + soul.size / 2) {
        takeDamage(1);
      }
    });
  }

  function takeDamage(amount) {
    playerHP -= amount;
    if (playerHP < 0) playerHP = 0;
    hpSpan.textContent = playerHP;
    if (playerHP <= 0) {
      setText("You died.");
      inAttackPhase = false;
    }
  }

  function enemyTakeDamage(amount) {
    boss.hp -= amount;
    if (boss.hp < 0) boss.hp = 0;

    if (boss.hp <= 0) {
      setText("You defeated " + boss.name + "!");
      inAttackPhase = false;
    } else {
      startEnemyAttack();
    }
  }

  function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBoss();
    drawBossHP();
    drawBox();
    drawSoul();
    drawBullets();

    updateSoul();
    updateBullets();

    if (inAttackPhase) {
      attackTimer++;
      if (attackTimer > attackDuration) {
        endEnemyAttack();
      }
    }

    requestAnimationFrame(gameLoop);
  }

  // Input
  window.addEventListener("keydown", e => keys[e.key] = true);
  window.addEventListener("keyup", e => keys[e.key] = false);

  // Buttons
  btnFight.onclick = () => {
    if (inAttackPhase || playerHP <= 0 || boss.hp <= 0) return;
    setText("You attack!");
    enemyTakeDamage(8);
  };

  btnAct.onclick = () => {
    if (inAttackPhase || playerHP <= 0 || boss.hp <= 0) return;
    setText("You tell " + boss.name + " a joke. It does not laugh.");
    startEnemyAttack();
  };

  btnItem.onclick = () => {
    if (inAttackPhase || playerHP <= 0 || boss.hp <= 0) return;
    if (playerHP >= 20) {
      setText("You don't need healing.");
      return;
    }
    setText("You ate a pie. HP restored.");
    playerHP = Math.min(20, playerHP + 10);
    hpSpan.textContent = playerHP;
    startEnemyAttack();
  };

  btnMercy.onclick = () => {
    if (inAttackPhase || playerHP <= 0 || boss.hp <= 0) return;
    if (boss.hp <= 10) {
      setText("You spared " + boss.name + ".");
      inAttackPhase = false;
    } else {
      setText(boss.name + " refuses.");
      startEnemyAttack();
    }
  };

  // Init
  setText(boss.name + " emerges from the darkness.");
  gameLoop();
</script>
